<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-zinc-900 p-8 rounded-3xl border border-zinc-800 text-center shadow-2xl">
        <h1 class="text-3xl font-black mb-2 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent italic tracking-tighter">AI VIDEO ENGINE</h1>
        <p class="text-[10px] text-zinc-500 mb-6 uppercase tracking-[0.2em]">Stability AI Diffusion XT</p>
        
        <div class="border-2 border-dashed border-zinc-700 rounded-2xl p-10 mb-6 bg-zinc-950 hover:border-blue-500 transition-colors">
            <input type="file" id="imageInput" class="hidden" accept="image/*">
            <label for="imageInput" class="cursor-pointer text-sm text-zinc-400">
                <span class="text-4xl block mb-2">📸</span> 
                <span id="fileNameDisplay">I-upload ang Image</span>
            </label>
        </div>

        <button onclick="generateVideo()" id="genBtn" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase tracking-widest hover:bg-blue-400 active:scale-95 transition-all">
            Generate Video
        </button>

        <div id="loader" class="mt-8 hidden">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500 mx-auto mb-4"></div>
            <p class="text-[10px] text-zinc-400 uppercase tracking-widest animate-pulse">AI is rendering your video...</p>
            <p class="text-[9px] text-zinc-600 mt-1 uppercase">(This takes 1-2 minutes)</p>
        </div>

        <video id="outputVideo" class="mt-8 w-full rounded-2xl hidden shadow-2xl border border-zinc-700" controls autoplay loop></video>
    </div>

    <script>
        // Automatic file name display
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || "Image Selected";
            document.getElementById('fileNameDisplay').innerText = fileName;
        });

        async function generateVideo() {
            const imageInput = document.getElementById('imageInput');
            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const videoElement = document.getElementById('outputVideo');
            
            // CLEAN TOKEN (NO SPACES)
            const hfToken ="hf_XEGCfUgftVtOqFodEXjLTwhKtTsj1CGtZh"; 

            if (!imageInput.files[0]) {
                alert("Pumili muna ng image bago i-click ang Generate!");
                return;
            }

            btn.disabled = true;
            btn.classList.add('opacity-50');
            loader.classList.remove('hidden');
            videoElement.classList.add('hidden');

            try {
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/stabilityai/stable-video-diffusion-img2vid-xt",
                    {
                        headers: { 
                            "Authorization": `Bearer ${hfToken}`,
                            "Content-Type": "application/octet-stream"
                        },
                        method: "POST",
                        body: imageInput.files[0],
                    }
                );

                if (response.ok) {
                    const blob = await response.blob();
                    const videoUrl = URL.createObjectURL(blob);
                    videoElement.src = videoUrl;
                    videoElement.classList.remove('hidden');
                    loader.classList.add('hidden');
                } else {
                    const error = await response.json();
                    alert("Server Message: " + (error.error || "Busy ang AI server. Subukan ulit."));
                }
            } catch (err) {
                alert("Connection error. Check your signal.");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>
