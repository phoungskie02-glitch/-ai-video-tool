<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-zinc-900 p-8 rounded-3xl border border-zinc-800 text-center">
        <h1 class="text-3xl font-black mb-2 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent italic text-center">AI VIDEO ENGINE</h1>
        
        <div class="border-2 border-dashed border-zinc-700 rounded-2xl p-10 mb-6 bg-zinc-950">
            <input type="file" id="imageInput" class="hidden" accept="image/*">
            <label for="imageInput" class="cursor-pointer text-sm text-zinc-400">
                <span class="text-4xl block mb-2">📸</span> I-upload ang Image
            </label>
        </div>

        <button onclick="generateVideo()" id="genBtn" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase tracking-widest hover:bg-blue-500 transition-all">
            Generate Video
        </button>

        <div id="loader" class="mt-6 hidden">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mx-auto"></div>
            <p class="text-[10px] mt-2 text-zinc-500 uppercase tracking-widest text-center">Processing AI Video...</p>
        </div>

        <video id="outputVideo" class="mt-6 w-full rounded-xl hidden shadow-2xl border border-zinc-700" controls></video>
    </div>

    <script>
        async function generateVideo() {
            const imageInput = document.getElementById('imageInput');
            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const videoElement = document.getElementById('outputVideo');
            
            // DITO MO I-PASTE ANG TOKEN MO SA LOOB NG QUOTES:
            const hfToken = "hf_XEGCfUgftVtOqFodEXjLTw hKtTsj1CGtZh"; 

            if (!imageInput.files[0]) {
                alert("Pumili muna ng image!");
                return;
            }

            btn.disabled = true;
            loader.classList.remove('hidden');
            videoElement.classList.add('hidden');

            try {
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/stabilityai/stable-video-diffusion-img2vid-xt",
                    {
                        headers: { Authorization: `Bearer ${hfToken.replace(/\s/g, '')}` },
                        method: "POST",
                        body: imageInput.files[0],
                    }
                );

                if (response.ok) {
                    const blob = await response.blob();
                    const videoUrl = URL.createObjectURL(blob);
                    videoElement.src = videoUrl;
                    videoElement.classList.remove('hidden');
                } else {
                    alert("Medyo busy ang AI server. Subukan ulit mamaya.");
                }
            } catch (err) {
                alert("Connection error.");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
