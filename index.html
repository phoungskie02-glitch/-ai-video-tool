<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-900 p-8 rounded-[2rem] border border-slate-800 text-center shadow-2xl">
        <h1 class="text-3xl font-black mb-1 bg-gradient-to-r from-cyan-400 to-blue-600 bg-clip-text text-transparent uppercase italic">AI Image Engine</h1>
        <p class="text-[10px] text-slate-500 mb-8 uppercase tracking-[0.3em]">Stable Diffusion v1.5</p>
        
        <div class="border-2 border-dashed border-slate-700 rounded-2xl p-8 mb-6 bg-slate-950 hover:border-cyan-500 transition-all group">
            <input type="file" id="imageInput" class="hidden" accept="image/*">
            <label for="imageInput" class="cursor-pointer text-sm text-slate-400">
                <span class="text-4xl block mb-2 group-hover:scale-110 transition-transform">🖼️</span> 
                <span id="fileNameDisplay">Pumili ng Photo</span>
            </label>
        </div>

        <button onclick="generateAI()" id="genBtn" class="w-full bg-cyan-500 text-slate-950 py-4 rounded-xl font-black uppercase tracking-widest hover:bg-cyan-400 active:scale-95 transition-all shadow-[0_0_20px_rgba(6,182,212,0.3)]">
            Transform Image
        </button>

        <div id="loader" class="mt-8 hidden">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-cyan-500 mx-auto mb-4"></div>
            <p class="text-[10px] text-cyan-400 uppercase tracking-widest animate-pulse">AI is thinking...</p>
        </div>

        <div id="resultContainer" class="mt-8 hidden">
            <p class="text-[10px] text-slate-500 mb-2 uppercase tracking-widest text-left">Result:</p>
            <img id="outputImage" class="w-full rounded-2xl shadow-2xl border border-slate-700" src="" alt="AI Result">
            <p class="text-[9px] text-slate-600 mt-2 italic">Long press the image to save</p>
        </div>
    </div>

    <script>
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || "Photo Selected";
            document.getElementById('fileNameDisplay').innerText = fileName;
        });

        async function generateAI() {
            const imageInput = document.getElementById('imageInput');
            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const resultContainer = document.getElementById('resultContainer');
            const outputImage = document.getElementById('outputImage');
            
            // CLEAN TOKEN (NO SPACES)
            const hfToken = "hf_XEGCfUgftVtOqFodEXjLTwhKtTsj1CGtZh"; 

            if (!imageInput.files[0]) {
                alert("Mag-upload muna ng picture!");
                return;
            }

            btn.disabled = true;
            btn.classList.add('opacity-50');
            loader.classList.remove('hidden');
            resultContainer.classList.add('hidden');

            try {
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/runwayml/stable-diffusion-v1-5",
                    {
                        headers: { 
                            "Authorization": "Bearer " + hfToken.trim(),
                            "Content-Type": "application/octet-stream"
                        },
                        method: "POST",
                        body: imageInput.files[0],
                    }
                );

                if (response.ok) {
                    const blob = await response.blob();
                    const imageUrl = URL.createObjectURL(blob);
                    outputImage.src = imageUrl;
                    resultContainer.classList.remove('hidden');
                    loader.classList.add('hidden');
                } else {
                    const error = await response.json();
                    alert("AI Server Busy. Wait 1 min and try again.");
                }
            } catch (err) {
                alert("Connection error. Check your data signal.");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>
